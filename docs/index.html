<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Chat Room</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="room-shell">
    <header class="room-bar">
      <div class="room-profile">
        <div class="profile-badge">CX</div>
        <div>
          <p class="room-kicker">Local Codex Messenger</p>
          <h1>Codex</h1>
          <p id="connection-copy" class="connection-copy">같은 PC의 로컬 relay를 찾는 중</p>
        </div>
      </div>

      <div class="room-actions">
        <span id="connection-chip" class="connection-chip is-searching">연결 확인 중</span>
        <button type="button" id="new-session" class="top-button">새 대화</button>
      </div>
    </header>

    <section class="room-stage">
      <div id="room-thread" class="room-thread">
        <div class="welcome-card">
          <p class="welcome-kicker">Chat Room</p>
          <strong>Codex 채팅방을 준비하는 중</strong>
          <p>같은 PC에서 localhost relay가 켜져 있으면 여기서 바로 대화처럼 지시하고, 상태 칩과 짧은 답으로 결과를 받습니다.</p>
        </div>
      </div>

      <form id="chat-form" class="composer-shell">
        <div id="composer-tools" class="composer-tools is-collapsed">
          <div class="tool-block">
            <p class="tool-label">대상</p>
            <div class="chip-row" id="target-chips">
              <button type="button" class="option-chip is-active" data-target="other">자동</button>
              <button type="button" class="option-chip" data-target="browser">브라우저</button>
              <button type="button" class="option-chip" data-target="desktop">바탕화면</button>
              <button type="button" class="option-chip" data-target="report">보고</button>
            </div>
          </div>

          <div class="tool-block">
            <p class="tool-label">우선순위</p>
            <div class="chip-row" id="priority-chips">
              <button type="button" class="option-chip is-active" data-priority="normal">보통</button>
              <button type="button" class="option-chip" data-priority="high">높음</button>
              <button type="button" class="option-chip" data-priority="urgent">긴급</button>
            </div>
          </div>

          <label class="json-drawer">
            <span>구조화 명령 JSON</span>
            <textarea id="command-json" rows="4" placeholder='{"mode":"desktop-command","action":"screen-size"}'></textarea>
          </label>
        </div>

        <div class="composer-main">
          <button type="button" id="toggle-tools" class="icon-button" aria-label="명령 옵션 열기">+</button>
          <label class="message-box" for="message">
            <textarea id="message" rows="1" placeholder="Codex에게 시킬 작업을 채팅처럼 입력하세요." required></textarea>
          </label>
          <button type="submit" id="send-button" class="send-button">전송</button>
        </div>

        <div class="composer-foot">
          <span id="composer-hint">relay가 켜져 있으면 GitHub 이슈 화면으로 튕기지 않고 여기서 바로 전송됩니다.</span>
        </div>
      </form>
    </section>
  </main>

  <script src="./app.js?v=20260309-relay-2"></script>
</body>
</html>
